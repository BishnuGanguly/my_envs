name: ETL Pipeline Scheduling Environment
description: >
  An OpenEnv-compliant environment for intelligent ETL data pipeline scheduling.
  An LLM agent observes a directed acyclic graph (DAG) of interdependent jobs,
  each with resource requirements (workers, CPU slots), optional SLA deadlines,
  and critical-path flags. The agent must issue schedule and wait actions to
  complete all jobs before the task deadline, maximising SLA compliance and
  critical-path throughput under tight resource constraints.
version: "1.0.0"
author: YourTeamName

observation_space:
  type: structured_json
  description: >
    A JSON object representing the current pipeline state, including:
    current time, task deadline, free/total worker and CPU counts,
    lists of ready/running/completed job IDs, full job metadata
    (duration, cpu_required, depends_on, sla_deadline, critical_path),
    DAG edges, critical-path edges, and the last action feedback string.

action_space:
  type: text
  actions:
    - "[wait]"
    - "[schedule: {job_id}]"
    - "[schedule: {job_id_1, job_id_2}]"
  description: >
    The agent responds with exactly one of two action formats per step.
    [wait] advances simulation time by the configured step_size (5 minutes).
    [schedule: {id}] or [schedule: {id1, id2}] starts one or more READY jobs,
    subject to worker and CPU availability. Multiple jobs may be batched in a
    single schedule action.

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: pipeline_easy
    description: >
      Single-stream critical-path scheduling with zero timing slack.
      A three-job linear chain (ingest -> clean -> report) must complete
      within 60 minutes using 2 workers and 4 CPU slots. The intermediate
      clean job carries a hard SLA deadline at 40 minutes, which expires
      if the agent wastes even one wait step before starting the first job.
      Tests whether the agent acts immediately on the critical path and
      understands that SLA deadlines count from episode start, not from
      when a job becomes ready.
    steps: 12
    ideal_action: "schedule immediately, no waiting"

  - id: pipeline_medium
    description: >
      Parallel ingest streams with a CPU-trap job and a cascade SLA.
      A non-critical job (ingest_logs) is available at t=0 but consumes
      3 of 6 CPU slots, which starves the critical clean_sales job when
      it becomes ready. Scheduling the trap causes a cascade SLA failure
      through compute_revenue and summary_report. Tests whether the agent
      can resist scheduling ready-but-harmful jobs, plan CPU budgets for
      future critical jobs, and parallelise the two safe ingest streams.
    steps: 24
    ideal_action: "schedule critical-path ingest jobs first, defer ingest_logs"

  - id: pipeline_difficult
    description: >
      Double-diamond DAG with a time-bomb anomaly detector and a CPU conflict.
      Two convergent dependency chains share a terminal bottleneck (daily_summary).
      anomaly_detection (SLA=130 min, 3 CPU) and compute_revenue (SLA=100 min,
      3 CPU) cannot run simultaneously under the 8-CPU budget and must be
      sequenced in deadline order. A temptation job (enrich_reference) must be
      scheduled in a precise window — too early starves ingest, too late collapses
      the anomaly path. Requires multi-horizon deadline reasoning, CPU conflict
      resolution, and exact job interleaving across 4 workers.
    steps: 36
    ideal_action: "sequence compute_revenue before anomaly_detection, schedule enrich_reference after first clean wave"

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.8
  score_formula: >
    Per-step reward = clamp(0.7 * sla_success_ratio + 0.3 * critical_sla_success_ratio, 0.01, 0.99)
    where sla_success_ratio      = (SLA-due jobs completed on time) / (all SLA-due jobs),
          critical_sla_success_ratio = (critical SLA-due jobs completed) / (critical SLA-due jobs),
          and both ratios default to 1.0 when no SLA deadlines have yet expired.
    Final task score = clamp(0.5 * mean(per_step_rewards) + 0.5 * (jobs_completed / total_jobs), 0.01, 0.99)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 4
  max_steps_per_task: 50
  step_size_minutes: 5